<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLH Shortener 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-8 text-gray-800 font-sans antialiased">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex items-center justify-between">
            <h1 class="text-3xl font-extrabold text-blue-600 flex items-center gap-2">
                🔗 MLH Shortener
                <span id="health-badge" class="text-xs bg-gray-200 text-gray-600 py-1 px-2 rounded-full font-medium ml-2">Checking Health...</span>
            </h1>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Create URL Form -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 col-span-1">
                <h2 class="text-xl font-bold mb-4">Shorten a URL</h2>
                <form id="url-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">User ID</label>
                        <input type="number" id="user-id" value="1" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Title</label>
                        <input type="text" id="title" placeholder="My Cool Link" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Original URL</label>
                        <input type="url" id="original-url" placeholder="https://example.com" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Custom Short Code (Optional)</label>
                        <input type="text" id="short-code" placeholder="Leave empty to auto-generate" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Shorten It!
                    </button>
                    <div id="form-msg" class="text-sm mt-2 text-center hidden"></div>
                </form>
            </div>

            <!-- List URLs -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Active Links</h2>
                    <button onclick="loadUrls()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">Refresh ↻</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Short Code</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Title</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Original URL</th>
                                <th class="px-3 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Action</th>
                            </tr>
                        </thead>
                        <tbody id="url-list" class="bg-white divide-y divide-gray-100 text-sm">
                            <tr><td colspan="4" class="text-center py-8 text-gray-400">Loading links...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "";

        async function checkHealth() {
            const badge = document.getElementById('health-badge');
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    badge.textContent = "API Online ✅";
                    badge.classList.replace('bg-gray-200', 'bg-green-100');
                    badge.classList.replace('text-gray-600', 'text-green-800');
                }
            } catch (err) {
                badge.textContent = "API Offline ❌";
                badge.classList.replace('bg-gray-200', 'bg-red-100');
                badge.classList.replace('text-gray-600', 'text-red-800');
            }
        }

        async function loadUrls() {
            const tbody = document.getElementById('url-list');
            try {
                const res = await fetch(`${API_URL}/urls`);
                const json = await res.json();
                
                if (json.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">No shortened URLs yet. Create one!</td></tr>`;
                    return;
                }

                tbody.innerHTML = json.data.map(u => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-3 py-3 whitespace-nowrap font-medium text-blue-600">
                            <a href="${u.original_url}" target="_blank">/${u.short_code}</a>
                        </td>
                        <td class="px-3 py-3 whitespace-nowrap text-gray-800 font-semibold">${u.title}</td>
                        <td class="px-3 py-3 whitespace-nowrap text-gray-500 max-w-[200px] truncate" title="${u.original_url}">
                            ${u.original_url}
                        </td>
                        <td class="px-3 py-3 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="deleteUrl(${u.id})" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-500">Failed to load URLs. Is the API running?</td></tr>`;
            }
        }

        async function deleteUrl(id) {
            if (!confirm("Are you sure you want to delete this URL?")) return;
            try {
                await fetch(`${API_URL}/urls/${id}`, { method: 'DELETE' });
                loadUrls();
            } catch (err) {
                alert("Failed to delete URL.");
            }
        }

        document.getElementById('url-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('form-msg');
            msg.classList.remove('hidden');
            msg.className = "text-sm mt-2 text-center text-gray-500";
            msg.textContent = "Shortening...";

            const payload = {
                user_id: parseInt(document.getElementById('user-id').value),
                title: document.getElementById('title').value,
                original_url: document.getElementById('original-url').value,
            };

            const code = document.getElementById('short-code').value.trim();
            if (code) payload.short_code = code;

            try {
                const res = await fetch(`${API_URL}/urls`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();

                if (res.ok) {
                    msg.className = "text-sm mt-2 text-center text-green-600 font-medium";
                    msg.textContent = "URL successfully shortened! 🎉";
                    document.getElementById('url-form').reset();
                    loadUrls();
                } else {
                    msg.className = "text-sm mt-2 text-center text-red-600 font-medium";
                    msg.textContent = data.error || "Failed to shorten URL.";
                }
            } catch (err) {
                msg.className = "text-sm mt-2 text-center text-red-600 font-medium";
                msg.textContent = "Network error. Is the API running?";
            }
        });

        // Initialize
        checkHealth();
        loadUrls();
    </script>
</body>
</html>
